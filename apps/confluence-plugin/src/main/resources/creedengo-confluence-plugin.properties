
# Creedengo Dashboard — Confluence Plugin i18n properties (default: English)
#
# Naming convention:
#   {macroKey}.label                     — Macro display name
#   {macroKey}.desc                      — Macro description
#   {macroKey}.param.{paramName}.label   — Parameter label
#   {macroKey}.param.{paramName}.desc    — Parameter description
#
# Macros defined in this file:
#   ecoscore       — Sustainability EcoScore (A–E rating)
#   dashboard      — Full sustainability dashboard
#   priorityrules  — Top priority SonarQube rules
#   piechart       — Donut chart per metric tag (CPU / RAM)



# ECOSCORE MACRO
# Macro label (displayed in the macro browser and as the macro name in the editor)
creedengo-ecoscore.label=Creedengo ecoscore
# Macro description
creedengo-ecoscore.desc=Show a preconfigured sustainability ecoscore for a given SonarQube project.
# Parameter labels (displayed as field names in the macro editor)
creedengo-ecoscore.param.sonarqube_url.label=SonarQube URL
creedengo-ecoscore.param.sonarqube_token.label=SonarQube Token
creedengo-ecoscore.param.project_key.label=Project Key
creedengo-ecoscore.param.branch.label=Branch
# Parameter descriptions (displayed as help text below each field)
creedengo-ecoscore.param.sonarqube_url.desc=URL of the SonarQube server (e.g. https://sonarqube.example.com)
creedengo-ecoscore.param.sonarqube_token.desc=Authentication token for the SonarQube server
creedengo-ecoscore.param.project_key.desc=Key of the SonarQube project to analyze
creedengo-ecoscore.param.branch.desc=Branch name to analyze (defaults to main)
# EcoScore i18n labels
ecoscore.header=EcoScore of project {0}
ecoscore.header.emptyurl=EcoScore Creedengo! empty sonarqube_url
ecoscore.subheader=Your eco-design Score is



