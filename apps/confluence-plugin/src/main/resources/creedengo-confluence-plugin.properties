# PIECHART MACRO
# Macro label (displayed in the macro browser and as the macro name in the editor)
piechart.label=Creedengo PieChart
# Macro description
piechart.desc=Show a donut chart of open SonarQube issues grouped by severity for a given metric tag (CPU or RAM).

# Parameter labels (displayed as field names in the macro editor)
piechart.param.sonarqube_url.label=SonarQube URL
piechart.param.sonarqube_token.label=SonarQube Token
piechart.param.project_key.label=Project Key
piechart.param.branch.label=Branch
piechart.param.metric_tag.label=Metric Tag

# Parameter descriptions (displayed as help text below each field)
piechart.param.sonarqube_url.desc=URL of the SonarQube server (e.g. https://sonarqube.example.com)
piechart.param.sonarqube_token.desc=Authentication token for the SonarQube server
piechart.param.project_key.desc=Key of the SonarQube project to analyze
piechart.param.branch.desc=Branch name to analyze (defaults to main)
piechart.param.metric_tag.desc=Resource metric tag to filter rules and issues (cpu or ram)

# PieChart i18n labels
piechart.header=Issues {1} for project {0}
piechart.header.emptyurl=Creedengo PieChart! empty sonarqube_url
piechart.donut.label=issues
piechart.legend.critical=Critical / Blocker
piechart.legend.major=Major
piechart.legend.minor=Minor / Info
piechart.legend.optimized=Optimized rules
piechart.rules.total=Total rules: {0} 