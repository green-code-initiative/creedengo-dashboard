# Libellés des paramètres
piechart.param.sonarqube_url.label=URL SonarQube
piechart.param.sonarqube_token.label=Jeton SonarQube
piechart.param.project_key.label=Clé du projet
piechart.param.branch.label=Branche
piechart.param.metric_tag.label=Tag métrique

# Descriptions des paramètres
piechart.param.sonarqube_url.desc=URL du serveur SonarQube (ex : https://sonarqube.exemple.com)
piechart.param.sonarqube_token.desc=Jeton d'authentification pour le serveur SonarQube
piechart.param.project_key.desc=Clé du projet SonarQube à analyser
piechart.param.branch.desc=Nom de la branche à analyser (par défaut : main)
