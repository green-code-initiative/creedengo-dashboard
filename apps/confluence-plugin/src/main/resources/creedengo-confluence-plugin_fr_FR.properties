# Creedengo Dashboard — Confluence Plugin i18n properties (fr_FR)
#
# Convention de nommage :
#   {macroKey}.label                     — Nom d'affichage de la macro
#   {macroKey}.desc                      — Description de la macro
#   {macroKey}.param.{paramName}.label   — Libellé du paramètre
#   {macroKey}.param.{paramName}.desc    — Description du paramètre
#
# Macros définies dans ce fichier :
#   ecoscore       — EcoScore de durabilité (note A–E)
#   dashboard      — Tableau de bord complet de durabilité
#   priorityrules  — Règles SonarQube les plus prioritaires
#   piechart       — Diagramme en donut par tag métrique (CPU / RAM)

# ECOSCORE MACRO
# Macro label (displayed in the macro browser and as the macro name in the editor)
creedengo-ecoscore.label=Creedengo ecoscore
# Macro description
creedengo-ecoscore.desc=Affiche un écoscore de durabilité préconfiguré pour un projet SonarQube donné.
# Parameter labels (displayed as field names in the macro editor)
creedengo-ecoscore.param.sonarqube_url.label=URL SonarQube
creedengo-ecoscore.param.sonarqube_token.label=Jeton SonarQube
creedengo-ecoscore.param.project_key.label=Clé du projet
creedengo-ecoscore.param.branch.label=Branche
# Parameter descriptions (displayed as help text below each field)
creedengo-ecoscore.param.sonarqube_url.desc=URL du serveur SonarQube (ex : https://sonarqube.exemple.com)
creedengo-ecoscore.param.sonarqube_token.desc=Jeton d'authentification pour le serveur SonarQube
creedengo-ecoscore.param.project_key.desc=Clé du projet SonarQube à analyser
creedengo-ecoscore.param.branch.desc=Nom de la branche à analyser (par défaut : main)
# EcoScore i18n labels
ecoscore.header=EcoScore du projet {0}
ecoscore.header.emptyurl=EcoScore Creedengo ! URL SonarQube manquante
ecoscore.subheader=Votre score d'éco-conception est


